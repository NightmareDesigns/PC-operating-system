name: Build Nightmare OS WinPE ISO

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  # ① Manual trigger – run this whenever you want a fresh ISO
  #    Go to: Actions → "Build Nightmare OS WinPE ISO" → Run workflow
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target architecture'
        required: false
        default: 'amd64'
        type: choice
        options:
          - amd64
          - x86
      include_python:
        description: 'Reserve a Python placeholder dir inside the PE image'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # ② Automatic build when a version tag is pushed (e.g. git tag v1.0 && git push --tags)
  #    The ISO is attached to the GitHub Release that is created for the tag.
  push:
    tags:
      - 'v*'

# ──────────────────────────────────────────────────────────────────────────────
# Permissions
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to upload assets to a GitHub Release
  actions:  read

# ──────────────────────────────────────────────────────────────────────────────
# Job
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build-winpe-iso:
    name: Build WinPE ISO (${{ github.event.inputs.architecture || 'amd64' }})
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      WORK_DIR: C:\WinPE_NightmareOS

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Windows ADK + WinPE Add-on via Chocolatey ─────────────
      #
      # Chocolatey is pre-installed on all GitHub-hosted Windows runners.
      # It installs the correct ADK version for the runner, handles the case
      # where ADK is already present (no-op / upgrade), and avoids the
      # exit-code 1001 problem that the offline layout approach triggers when
      # a newer ADK is already installed on Windows Server 2025 runners.
      - name: Install Windows ADK via Chocolatey
        id: install-adk
        shell: pwsh
        run: |
          Write-Host "Installing Windows ADK via Chocolatey..."
          choco install windows-adk       --no-progress -y 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            Write-Error "windows-adk Chocolatey install failed (exit $LASTEXITCODE)"
            exit 1
          }
          choco install windows-adk-winpe --no-progress -y 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            Write-Error "windows-adk-winpe Chocolatey install failed (exit $LASTEXITCODE)"
            exit 1
          }
          Write-Host "✓ Windows ADK + WinPE add-on installed successfully"

      # ── 3. Install xorriso (alternative ISO creator; no ADK dependency) ───
      #
      # xorriso creates El Torito bootable ISOs (BIOS + UEFI) independently
      # of Windows ADK.  Build-NightmareOS-PE.ps1 tries oscdimg first and
      # falls back to xorriso automatically, so both tools are available.
      - name: Install xorriso (alternative ISO creator)
        id: install-xorriso
        shell: pwsh
        run: |
          Write-Host "Installing xorriso via Chocolatey..."
          choco install xorriso --no-progress -y 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠ xorriso install returned exit $LASTEXITCODE (non-fatal – build script searches common locations too)"
          }
          $xr = Get-Command xorriso -ErrorAction SilentlyContinue
          if ($xr) {
            Write-Host "✓ xorriso available at: $($xr.Source)"
          } else {
            Write-Host "⚠ xorriso not in PATH after install (build script will search common locations)"
          }

      # ── 3b. Verify ADK installation and show discovered path ──────────────
      #
      # Confirms the ADK was installed correctly before the build starts.
      # Shows the exact path that Find-ADKPath will use, making CI logs
      # easier to debug if the build step fails to find a tool.
      - name: Verify ADK installation
        shell: pwsh
        run: |
          function Find-ADKPath {
            $regPaths = @(
              "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows Kits\Installed Roots",
              "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots"
            )
            foreach ($rp in $regPaths) {
              try {
                if (Test-Path $rp) {
                  $root = (Get-ItemProperty $rp -ErrorAction SilentlyContinue).KitsRoot10
                  if ($root) {
                    $candidate = Join-Path $root "Assessment and Deployment Kit"
                    if (Test-Path $candidate) { return $candidate }
                  }
                }
              } catch {}
            }
            foreach ($p in @(
              "${env:ProgramFiles(x86)}\Windows Kits\10\Assessment and Deployment Kit",
              "${env:ProgramFiles}\Windows Kits\10\Assessment and Deployment Kit"
            )) { if (Test-Path $p) { return $p } }
            return $null
          }
          $adk = Find-ADKPath
          if ($adk) {
            Write-Host "✓ ADK found at: $adk"
            $winpe = Join-Path $adk "Windows Preinstallation Environment"
            if (Test-Path $winpe) { Write-Host "✓ WinPE add-on present: $winpe" }
            else { Write-Host "⚠ WinPE add-on NOT found under ADK path (may cause build failure)" }
          } else {
            Write-Warning "ADK not found via registry or known paths – build script will perform its own search."
          }

      # ── 4. Build Nightmare OS WinPE ISO ───────────────────────────────────
      - name: Build Nightmare OS WinPE ISO
        shell: pwsh
        run: |
          $arch      = if ("${{ github.event.inputs.architecture }}"   -ne '') { "${{ github.event.inputs.architecture }}"   } else { 'amd64' }
          # [bool]::Parse() requires 'True'/'False'; normalise the input string to title-case.
          $incPython = if ("${{ github.event.inputs.include_python }}" -ne '') { [bool]::Parse(("${{ github.event.inputs.include_python }}").Substring(0,1).ToUpper() + ("${{ github.event.inputs.include_python }}").Substring(1).ToLower()) } else { $false }

          Write-Host "Architecture  : $arch"
          Write-Host "IncludePython : $incPython"
          Write-Host "WorkDir       : $env:WORK_DIR"

          .\winpe\Build-NightmareOS-PE.ps1 `
              -Architecture  $arch `
              -CreateISO     $true `
              -WorkDir       $env:WORK_DIR `
              -IncludePython $incPython

      # ── 5. Verify ISO ──────────────────────────────────────────────────────
      - name: Verify ISO and collect metadata
        id: iso-meta
        shell: pwsh
        run: |
          $isoPath = "$env:WORK_DIR\NightmareOS-PE.iso"
          if (-not (Test-Path $isoPath)) {
              Write-Error "ISO not found at $isoPath – build step may have failed."
              exit 1
          }
          $iso    = Get-Item $isoPath
          $sizeMB = [math]::Round($iso.Length / 1MB, 1)
          Write-Host "ISO: $($iso.FullName)  ($sizeMB MB)"
          echo "iso_path=$($iso.FullName)" >> $env:GITHUB_OUTPUT
          echo "iso_size_mb=$sizeMB"       >> $env:GITHUB_OUTPUT

      # ── 6. Upload ISO as workflow artifact ───────────────────────────────
      #
      # After the run, go to:
      #   Actions → this run → Artifacts (bottom of the page)
      # Click "NightmareOS-PE-ISO-<run_number>" to download a ZIP.
      # Extract the ZIP to get NightmareOS-PE.iso  (~300-500 MB).
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: NightmareOS-PE-ISO-${{ github.run_number }}
          path: ${{ steps.iso-meta.outputs.iso_path }}
          retention-days: 30
          if-no-files-found: error

      # ── 7. Attach ISO to GitHub Release (tag builds only) ─────────────────
      - name: Attach ISO to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.iso-meta.outputs.iso_path }}
          name: "Nightmare OS ${{ github.ref_name }}"
          body: |
            ## Nightmare OS WinPE – ${{ github.ref_name }}

            Bootable ISO (dual BIOS + UEFI) built automatically from this commit.

            **Size**: ${{ steps.iso-meta.outputs.iso_size_mb }} MB

            ### Usage
            | Method | Instructions |
            |---|---|
            | **VirtualBox / VMware / Hyper-V** | Attach ISO as optical drive → boot |
            | **USB (Rufus)** | Open [Rufus](https://rufus.ie), select ISO, write to USB |
            | **DVD** | Right-click ISO → *Burn disc image* |

      # ── 8. Job summary ────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: pwsh
        run: |
          $sizeMB   = "${{ steps.iso-meta.outputs.iso_size_mb }}"
          $arch     = if ("${{ github.event.inputs.architecture }}" -ne '') { "${{ github.event.inputs.architecture }}" } else { 'amd64' }
          $run      = "${{ github.run_number }}"
          # Use the outcome of the iso-meta step as the source of truth for success.
          $ok       = "${{ steps.iso-meta.outcome }}" -eq 'success'

          $icon   = if ($ok) { '✅' } else { '❌' }
          $status = if ($ok) { 'Build succeeded' } else { 'Build failed – see step logs for details' }

          $md = @"
          ## ${icon} Nightmare OS WinPE ISO – ${status}

          | Property | Value |
          |---|---|
          | Architecture | ``${arch}`` |
          | ISO size | ${sizeMB} MB |
          | Artifact | ``NightmareOS-PE-ISO-${run}`` |
          | Retention | 30 days |

          ### How to download the ISO

          1. Scroll to the **Artifacts** section at the bottom of this page.
          2. Click **``NightmareOS-PE-ISO-${run}``** – a ZIP file downloads.
          3. Extract the ZIP to get ``NightmareOS-PE.iso``.

          ### How to use the ISO

          | Method | Steps |
          |---|---|
          | **VirtualBox** | New VM → Settings → Storage → attach ISO as optical drive → Start |
          | **VMware** | New VM wizard → attach ISO → Power On |
          | **Hyper-V** | New VM → DVD settings → attach ISO → Start |
          | **USB (Rufus)** | [rufus.ie](https://rufus.ie) – select ISO, GPT/UEFI, click START |
          | **DVD** | Right-click ISO → *Burn disc image* |

          ### To build again

          Go to **Actions → Build Nightmare OS WinPE ISO → Run workflow**.
          "@
          $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
