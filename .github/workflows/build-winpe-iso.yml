name: Build Nightmare OS WinPE ISO

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  # ① Manual trigger – run this whenever you want a fresh ISO
  #    Go to: Actions → "Build Nightmare OS WinPE ISO" → Run workflow
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target architecture'
        required: false
        default: 'amd64'
        type: choice
        options:
          - amd64
          - x86
      include_python:
        description: 'Reserve a Python placeholder dir inside the PE image'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # ② Automatic build when a version tag is pushed (e.g. git tag v1.0 && git push --tags)
  #    The ISO is attached to the GitHub Release that is created for the tag.
  push:
    tags:
      - 'v*'

  # ③ Build-check on every pull request that touches workflow or WinPE scripts
  pull_request:
    paths:
      - '.github/workflows/build-winpe-iso.yml'
      - 'winpe/**'

# ──────────────────────────────────────────────────────────────────────────────
# Permissions
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to upload assets to a GitHub Release
  actions:  read

# ──────────────────────────────────────────────────────────────────────────────
# Job
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build-winpe-iso:
    name: Build WinPE ISO (${{ github.event.inputs.architecture || 'amd64' }})
    runs-on: windows-latest
    env:
      WORK_DIR: C:\WinPE_NightmareOS

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Windows ADK + WinPE Add-on ────────────────────────────
      #
      # Strategy:
      #   a) Try Chocolatey (fast, handles version conflicts).
      #      The windows-adk-winpe Chocolatey package is sometimes marked
      #      "Likely broken for FOSS users" — it may install copype.cmd but
      #      omit the architecture-specific PE files (amd64\winpe.wim, etc.)
      #      that copype.cmd needs to build a working directory.
      #   b) After both Chocolatey installs, verify the architecture-specific
      #      WinPE content directory exists (amd64\ with winpe.wim or WinPE_OCs).
      #   c) If missing, fall back to a direct online install via the official
      #      Microsoft fwlink (adkwinpesetup.exe /quiet online mode).
      - name: Install Windows ADK via Chocolatey
        id: install-adk
        shell: pwsh
        run: |
          Write-Host "Installing Windows ADK via Chocolatey..."
          choco install windows-adk       --no-progress -y 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            Write-Error "windows-adk Chocolatey install failed (exit $LASTEXITCODE)"
            exit 1
          }
          choco install windows-adk-winpe --no-progress -y 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            Write-Error "windows-adk-winpe Chocolatey install failed (exit $LASTEXITCODE)"
            exit 1
          }
          Write-Host "✓ Windows ADK + WinPE add-on installed via Chocolatey"

          # Verify the architecture-specific WinPE PE files are present.
          # The Chocolatey windows-adk-winpe package is sometimes "Likely broken
          # for FOSS users" and installs copype.cmd but omits the amd64\ directory
          # tree (winpe.wim / WinPE_OCs) that copype.cmd reads from.  Checking
          # for those files is the correct indicator that the install succeeded.
          $arch = "${{ github.event.inputs.architecture }}"
          if ($arch -notin @('amd64','x86')) { $arch = 'amd64' }

          # Look for the WinPE root (Windows Preinstallation Environment dir) first.
          $peSearchRoots = @(
            "${env:ProgramFiles(x86)}\Windows Kits",
            "${env:ProgramFiles}\Windows Kits"
          )
          $winPERoot = Get-ChildItem $peSearchRoots `
              -Filter "Windows Preinstallation Environment" -Recurse -Depth 5 `
              -ErrorAction SilentlyContinue -Directory |
              Select-Object -First 1 -ExpandProperty FullName

          $archPEOk = $false
          if ($winPERoot) {
            $archDir = Join-Path $winPERoot $arch
            # winpe.wim is required for the build — check amd64\ (older ADK) and
            # amd64\en-us\ (Windows 11 ADK v10.1.26100+ stores it here).
            $wimFound = (Test-Path "$archDir\winpe.wim") -or (Test-Path "$archDir\en-us\winpe.wim")
            if ($wimFound -and (Test-Path "$archDir\WinPE_OCs")) {
              Write-Host "✓ WinPE $arch architecture files verified at: $archDir"
              $archPEOk = $true
            } else {
              if (-not $wimFound) {
                Write-Host "⚠ winpe.wim missing from $archDir and $archDir\en-us — fallback required"
              } else {
                Write-Host "⚠ WinPE_OCs missing from $archDir — fallback required"
              }
            }
          } else {
            Write-Host "⚠ Windows Preinstallation Environment directory not found after Chocolatey install"
          }

          if (-not $archPEOk) {
            Write-Host "Falling back to direct Microsoft download of WinPE add-on..."
            # Official Microsoft bootstrapper in online (non-layout) mode.
            # Does NOT trigger exit 1001 because it is not an offline layout installer.
            $ADK_PE_URL = "https://go.microsoft.com/fwlink/?linkid=2289981"
            $peSetup = "$env:TEMP\adkwinpesetup.exe"
            Write-Host "Downloading WinPE add-on setup (~5 MB)..."
            Invoke-WebRequest -Uri $ADK_PE_URL -OutFile $peSetup
            Write-Host "Installing WinPE add-on online..."
            $peArgs = @(
              '/features', 'OptionId.WindowsPreinstallationEnvironment',
              '/quiet', '/norestart', '/ceip', 'off'
            )
            $proc = Start-Process -Wait -PassThru $peSetup -ArgumentList $peArgs
            # 0=success  3010=reboot-pending (CI-safe)  1001=already-installed (treat as success)
            if ($proc.ExitCode -notin @(0, 3010, 1001)) {
              Write-Error "WinPE add-on direct install failed (exit $($proc.ExitCode))"
              exit 1
            }
            Write-Host "✓ WinPE add-on installed directly from Microsoft (exit $($proc.ExitCode))"
          }

      # ── 3. Install xorriso (alternative ISO creator; no ADK dependency) ───
      #
      # xorriso creates El Torito bootable ISOs (BIOS + UEFI) independently
      # of Windows ADK.  Build-NightmareOS-PE.ps1 tries oscdimg first and
      # falls back to xorriso automatically, so both tools are available.
      - name: Install xorriso (alternative ISO creator)
        id: install-xorriso
        shell: pwsh
        run: |
          Write-Host "Installing xorriso via Chocolatey..."
          choco install xorriso --no-progress -y 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠ xorriso package not available in Chocolatey (exit $LASTEXITCODE) – build script will use oscdimg from ADK instead"
          }
          $xr = Get-Command xorriso -ErrorAction SilentlyContinue
          if ($xr) {
            Write-Host "✓ xorriso available at: $($xr.Source)"
          } else {
            Write-Host "ℹ xorriso not in PATH – oscdimg from Windows ADK will be used as the primary ISO tool"
          }
          # Always succeed: xorriso is an optional fallback; ADK oscdimg is the primary ISO creator
          exit 0

      # ── 3b. Verify ADK installation and show discovered path ──────────────
      #
      # Confirms the ADK was installed correctly before the build starts.
      # Shows the exact paths that Find-ADKPath and Find-OscdimgPath will
      # use, making CI logs easier to debug if the build step fails.
      - name: Verify ADK installation
        shell: pwsh
        run: |
          function Find-ADKPath {
            $regPaths = @(
              "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows Kits\Installed Roots",
              "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots"
            )
            foreach ($rp in $regPaths) {
              try {
                if (Test-Path $rp) {
                  $root = (Get-ItemProperty $rp -ErrorAction SilentlyContinue).KitsRoot10
                  if ($root) {
                    $candidate = Join-Path $root "Assessment and Deployment Kit"
                    if (Test-Path $candidate) { return $candidate }
                  }
                }
              } catch {}
            }
            foreach ($p in @(
              "${env:ProgramFiles(x86)}\Windows Kits\10\Assessment and Deployment Kit",
              "${env:ProgramFiles}\Windows Kits\10\Assessment and Deployment Kit"
            )) { if (Test-Path $p) { return $p } }
            return $null
          }
          $adk = Find-ADKPath
          if ($adk) {
            Write-Host "✓ ADK found at: $adk"
            $winpe = Join-Path $adk "Windows Preinstallation Environment"
            if (Test-Path $winpe) { Write-Host "✓ WinPE add-on present: $winpe" }
            else { Write-Host "⚠ WinPE add-on NOT found under ADK path (may cause build failure)" }
            # Check for oscdimg.exe (primary ISO creation tool)
            # Only check known-valid architectures; fall back to amd64 for non-dispatch triggers.
            $arch = "${{ github.event.inputs.architecture }}"
            if ($arch -notin @('amd64','x86')) { $arch = 'amd64' }
            $oscdimgFound = $false
            foreach ($a in @($arch, 'amd64', 'x86') | Select-Object -Unique) {
              $p = Join-Path $adk "Deployment Tools\$a\Oscdimg\oscdimg.exe"
              if (Test-Path $p) {
                Write-Host "✓ oscdimg.exe found at: $p"
                $oscdimgFound = $true
                break
              }
            }
            if (-not $oscdimgFound) {
              # Fallback: filesystem search under Windows Kits.
              # Depth 5 matches the ADK tree: Windows Kits\10\ADK\Deployment Tools\<arch>\Oscdimg\
              $hit = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits","${env:ProgramFiles}\Windows Kits" `
                       -Filter oscdimg.exe -Recurse -Depth 5 -ErrorAction SilentlyContinue |
                     Select-Object -First 1
              if ($hit) { Write-Host "✓ oscdimg.exe found via search: $($hit.FullName)"; $oscdimgFound = $true }
            }
            if (-not $oscdimgFound) {
              Write-Host "⚠ oscdimg.exe NOT found – build will fail at ISO creation step unless xorriso is available"
            }
          } else {
            Write-Warning "ADK not found via registry or known paths – build script will perform its own search."
          }

      # ── 4. Build Nightmare OS WinPE ISO ───────────────────────────────────
      - name: Build Nightmare OS WinPE ISO
        shell: pwsh
        run: |
          $arch      = if ("${{ github.event.inputs.architecture }}"   -ne '') { "${{ github.event.inputs.architecture }}"   } else { 'amd64' }
          # [bool]::Parse() requires 'True'/'False'; normalise the input string to title-case.
          $incPython = if ("${{ github.event.inputs.include_python }}" -ne '') { [bool]::Parse(("${{ github.event.inputs.include_python }}").Substring(0,1).ToUpper() + ("${{ github.event.inputs.include_python }}").Substring(1).ToLower()) } else { $false }

          Write-Host "Architecture  : $arch"
          Write-Host "IncludePython : $incPython"
          Write-Host "WorkDir       : $env:WORK_DIR"

          .\winpe\Build-NightmareOS-PE.ps1 `
              -Architecture  $arch `
              -CreateISO     $true `
              -WorkDir       $env:WORK_DIR `
              -IncludePython $incPython

      # ── 5. Verify ISO ──────────────────────────────────────────────────────
      - name: Verify ISO and collect metadata
        id: iso-meta
        shell: pwsh
        run: |
          $isoPath = "$env:WORK_DIR\NightmareOS-PE.iso"
          if (-not (Test-Path $isoPath)) {
              Write-Error "ISO not found at $isoPath – build step may have failed."
              exit 1
          }
          $iso    = Get-Item $isoPath
          $sizeMB = [math]::Round($iso.Length / 1MB, 1)
          Write-Host "ISO: $($iso.FullName)  ($sizeMB MB)"
          echo "iso_path=$($iso.FullName)" >> $env:GITHUB_OUTPUT
          echo "iso_size_mb=$sizeMB"       >> $env:GITHUB_OUTPUT

      # ── 6. Upload ISO as workflow artifact ───────────────────────────────
      #
      # After the run, go to:
      #   Actions → this run → Artifacts (bottom of the page)
      # Click "NightmareOS-PE-ISO-<run_number>" to download a ZIP.
      # Extract the ZIP to get NightmareOS-PE.iso  (~300-500 MB).
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: NightmareOS-PE-ISO-${{ github.run_number }}
          path: ${{ steps.iso-meta.outputs.iso_path }}
          retention-days: 30
          if-no-files-found: error

      # ── 7. Attach ISO to GitHub Release (tag builds only) ─────────────────
      - name: Attach ISO to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.iso-meta.outputs.iso_path }}
          name: "Nightmare OS ${{ github.ref_name }}"
          body: |
            ## Nightmare OS WinPE – ${{ github.ref_name }}

            Bootable ISO (dual BIOS + UEFI) built automatically from this commit.

            **Size**: ${{ steps.iso-meta.outputs.iso_size_mb }} MB

            ### Usage
            | Method | Instructions |
            |---|---|
            | **VirtualBox / VMware / Hyper-V** | Attach ISO as optical drive → boot |
            | **USB (Rufus)** | Open [Rufus](https://rufus.ie), select ISO, write to USB |
            | **DVD** | Right-click ISO → *Burn disc image* |

      # ── 8. Job summary ────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: pwsh
        run: |
          $sizeMB   = "${{ steps.iso-meta.outputs.iso_size_mb }}"
          $arch     = if ("${{ github.event.inputs.architecture }}" -ne '') { "${{ github.event.inputs.architecture }}" } else { 'amd64' }
          $run      = "${{ github.run_number }}"
          # Use the outcome of the iso-meta step as the source of truth for success.
          $ok       = "${{ steps.iso-meta.outcome }}" -eq 'success'

          $icon   = if ($ok) { '✅' } else { '❌' }
          $status = if ($ok) { 'Build succeeded' } else { 'Build failed – see step logs for details' }

          $md = @"
          ## ${icon} Nightmare OS WinPE ISO – ${status}

          | Property | Value |
          |---|---|
          | Architecture | ``${arch}`` |
          | ISO size | ${sizeMB} MB |
          | Artifact | ``NightmareOS-PE-ISO-${run}`` |
          | Retention | 30 days |

          ### How to download the ISO

          1. Scroll to the **Artifacts** section at the bottom of this page.
          2. Click **``NightmareOS-PE-ISO-${run}``** – a ZIP file downloads.
          3. Extract the ZIP to get ``NightmareOS-PE.iso``.

          ### How to use the ISO

          | Method | Steps |
          |---|---|
          | **VirtualBox** | New VM → Settings → Storage → attach ISO as optical drive → Start |
          | **VMware** | New VM wizard → attach ISO → Power On |
          | **Hyper-V** | New VM → DVD settings → attach ISO → Start |
          | **USB (Rufus)** | [rufus.ie](https://rufus.ie) – select ISO, GPT/UEFI, click START |
          | **DVD** | Right-click ISO → *Burn disc image* |

          ### To build again

          Go to **Actions → Build Nightmare OS WinPE ISO → Run workflow**.
          "@
          $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
