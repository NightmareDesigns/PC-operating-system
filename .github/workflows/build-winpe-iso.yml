name: Build Nightmare OS WinPE ISO

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  # ① Manual trigger – run this whenever you want a fresh ISO
  #    Go to: Actions → "Build Nightmare OS WinPE ISO" → Run workflow
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target architecture'
        required: false
        default: 'amd64'
        type: choice
        options:
          - amd64
          - x86
      include_python:
        description: 'Reserve a Python placeholder dir inside the PE image'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # ② Automatic build when a version tag is pushed (e.g. git tag v1.0 && git push --tags)
  #    The ISO is attached to the GitHub Release that is created for the tag.
  push:
    tags:
      - 'v*'

# ──────────────────────────────────────────────────────────────────────────────
# Permissions
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to upload assets to a GitHub Release
  actions:  read

# ──────────────────────────────────────────────────────────────────────────────
# Job
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build-winpe-iso:
    name: Build WinPE ISO (${{ github.event.inputs.architecture || 'amd64' }})
    runs-on: windows-latest
    # ADK download + install takes ~20-30 min on a cache miss;
    # ~5-10 min on a cache hit.  Build itself is ~5 min.
    timeout-minutes: 90

    env:
      WORK_DIR:         C:\WinPE_NightmareOS
      ADK_LAYOUT_DIR:   C:\ADK-Layout
      ADK_PE_LAYOUT_DIR: C:\ADK-PE-Layout
      # Official redirect URLs for Windows 11 24H2 ADK and WinPE add-on.
      # If Microsoft changes the links, update these and bump ADK_CACHE_KEY.
      ADK_URL:    "https://go.microsoft.com/fwlink/?linkid=2289980"
      ADK_PE_URL: "https://go.microsoft.com/fwlink/?linkid=2289981"
      # Bump the version suffix to force a fresh ADK download.
      ADK_CACHE_KEY: "windows-adk-win11-layout-v2"

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Restore ADK offline-layout cache ──────────────────────────────
      #
      # The layout directories hold all installer packages for:
      #   • Windows ADK  → OptionId.DeploymentTools (~700 MB)
      #   • WinPE Add-on → OptionId.WindowsPreinstallationEnvironment (~1.5 GB)
      #
      # Caching them saves 20-30 min on every non-first run.
      - name: Restore ADK layout cache
        id: cache-adk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ADK_LAYOUT_DIR }}
            ${{ env.ADK_PE_LAYOUT_DIR }}
          key: ${{ env.ADK_CACHE_KEY }}

      # ── 3. Detect if ADK is already on this runner ───────────────────────────
      #
      # windows-latest (Windows Server 2025) ships with a recent ADK build.
      # If the required components are already present we skip every download
      # and install step, saving 20-30 min and avoiding the version-conflict
      # exit code 1001 that the older setup EXEs return when a newer ADK is
      # already installed.
      - name: Check if Windows ADK is already installed
        id: adk-check
        shell: pwsh
        run: |
          $adkInstalled = $false
          $adkFoundPath = ""

          function Test-ADKRoot([string]$adkRoot) {
            $deployTools = Join-Path $adkRoot "Deployment Tools\DandISetEnv.bat"
            $winPeEnv    = Join-Path $adkRoot "Windows Preinstallation Environment"
            return (Test-Path $deployTools) -and (Test-Path $winPeEnv)
          }

          # ── Source 1: Registry (both WOW6432Node and native hive) ─────────────
          $regPaths = @(
            "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows Kits\Installed Roots",
            "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots"
          )
          foreach ($regPath in $regPaths) {
            try {
              if (Test-Path $regPath) {
                $kitsRoot = (Get-ItemProperty -Path $regPath -ErrorAction SilentlyContinue).KitsRoot10
                if ($kitsRoot) {
                  $candidate = Join-Path $kitsRoot "Assessment and Deployment Kit"
                  if (Test-ADKRoot $candidate) {
                    Write-Host "✓ ADK found via registry ($regPath): $candidate"
                    $adkInstalled = $true; $adkFoundPath = $candidate; break
                  }
                }
              }
            } catch {
              Write-Host "Registry check ($regPath) failed (non-fatal): $_"
            }
          }

          # ── Source 2: Known filesystem paths (32-bit and 64-bit Program Files) ─
          if (-not $adkInstalled) {
            $candidates = @(
              "${env:ProgramFiles(x86)}\Windows Kits\10\Assessment and Deployment Kit",
              "${env:ProgramFiles}\Windows Kits\10\Assessment and Deployment Kit"
            )
            foreach ($candidate in $candidates) {
              if (Test-ADKRoot $candidate) {
                Write-Host "✓ ADK found at known path: $candidate"
                $adkInstalled = $true; $adkFoundPath = $candidate; break
              }
            }
          }

          # ── Source 3: Get-Package (Windows package manager) ───────────────────
          if (-not $adkInstalled) {
            try {
              $pkg = Get-Package -Name "*Windows Assessment and Deployment Kit*" `
                                 -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($pkg) {
                Write-Host "Get-Package found: $($pkg.Name) at $($pkg.Source)"
                # Derive ADK root from package metadata / common sub-paths
                $pkgLoc = Split-Path $pkg.Source -ErrorAction SilentlyContinue
                foreach ($sub in @("Assessment and Deployment Kit", ".")) {
                  $candidate = if ($sub -eq ".") { $pkgLoc } else { Join-Path $pkgLoc $sub }
                  if ($candidate -and (Test-ADKRoot $candidate)) {
                    Write-Host "✓ ADK confirmed via Get-Package at: $candidate"
                    $adkInstalled = $true; $adkFoundPath = $candidate; break
                  }
                }
              }
            } catch {
              Write-Host "Get-Package check failed (non-fatal): $_"
            }
          }

          # ── Source 4: winget (Windows Package Manager CLI) ────────────────────
          if (-not $adkInstalled) {
            try {
              $wg = Get-Command winget -ErrorAction SilentlyContinue
              if ($wg) {
                $wgOut = & winget list --name "Windows Assessment and Deployment Kit" 2>&1 |
                         Where-Object { $_ -match "Windows Assessment" }
                if ($wgOut) {
                  Write-Host "winget reports ADK installed: $wgOut"
                  # Resolve actual path from registry/filesystem since winget doesn't give path
                  $kitsRoot = (Get-ItemProperty `
                    "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows Kits\Installed Roots" `
                    -ErrorAction SilentlyContinue).KitsRoot10
                  if (-not $kitsRoot) {
                    $kitsRoot = (Get-ItemProperty `
                      "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots" `
                      -ErrorAction SilentlyContinue).KitsRoot10
                  }
                  if ($kitsRoot) {
                    $candidate = Join-Path $kitsRoot "Assessment and Deployment Kit"
                    if (Test-Path $candidate) {
                      Write-Host "✓ ADK path resolved via winget+registry: $candidate"
                      $adkInstalled = $true; $adkFoundPath = $candidate
                    }
                  }
                }
              }
            } catch {
              Write-Host "winget check failed (non-fatal): $_"
            }
          }

          # ── Source 5: Filesystem search for copype.cmd ────────────────────────
          # copype.cmd lives at: <ADK>\Windows Preinstallation Environment\<arch>\copype.cmd
          # Walking up 3 levels gives the ADK root.
          if (-not $adkInstalled) {
            try {
              $searchRoots = @(
                "${env:ProgramFiles(x86)}\Windows Kits",
                "${env:ProgramFiles}\Windows Kits",
                "$env:SystemDrive\Windows Kits"
              ) | Where-Object { Test-Path $_ }
              foreach ($sr in $searchRoots) {
                $hit = Get-ChildItem -Path $sr -Filter "copype.cmd" -Recurse `
                                     -Depth 4 -ErrorAction SilentlyContinue |
                       Select-Object -First 1
                if ($hit) {
                  # <ADK root>\Windows Preinstallation Environment\<arch>\copype.cmd
                  $candidate = $hit.DirectoryName | Split-Path | Split-Path
                  Write-Host "Found copype.cmd at: $($hit.FullName) → ADK root: $candidate"
                  if (Test-ADKRoot $candidate) {
                    Write-Host "✓ ADK confirmed via copype.cmd search: $candidate"
                    $adkInstalled = $true; $adkFoundPath = $candidate; break
                  }
                }
              }
            } catch {
              Write-Host "copype.cmd search failed (non-fatal): $_"
            }
          }

          # ── Diagnostic: show Windows Kits directory tree if still not found ─────
          if (-not $adkInstalled) {
            Write-Host "--- Diagnostic: Windows Kits directories ---"
            @("${env:ProgramFiles(x86)}\Windows Kits", "${env:ProgramFiles}\Windows Kits") |
              Where-Object { Test-Path $_ } | ForEach-Object {
                Write-Host "Contents of ${_}:"
                Get-ChildItem $_ -Directory -Recurse -Depth 2 -ErrorAction SilentlyContinue |
                  Select-Object -First 40 -ExpandProperty FullName |
                  ForEach-Object { Write-Host "  $_" }
              }
          }

          if ($adkInstalled) {
            Write-Host "→ Skipping download/install steps (ADK already present)"
            echo "installed=true"  >> $env:GITHUB_OUTPUT
            echo "adk_path=$adkFoundPath" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "→ ADK not found via any source – will download and install"
            echo "installed=false" >> $env:GITHUB_OUTPUT
          }

      # ── 4. Download layouts (cache miss + not pre-installed only) ────────────
      - name: Download Windows ADK offline layouts
        id: download-adk
        if: steps.cache-adk.outputs.cache-hit != 'true' && steps.adk-check.outputs.installed != 'true'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          New-Item -ItemType Directory -Path $env:ADK_LAYOUT_DIR    -Force | Out-Null
          New-Item -ItemType Directory -Path $env:ADK_PE_LAYOUT_DIR -Force | Out-Null

          $adkPreinstalled = $false

          # ---- Windows ADK (Deployment Tools) ----
          Write-Host "::group::Download Windows ADK layout"
          $adkSetup = "$env:TEMP\adksetup.exe"
          Write-Host "Fetching ADK setup (~5 MB)..."
          Invoke-WebRequest -Uri $env:ADK_URL -OutFile $adkSetup -UseBasicParsing
          Write-Host "Downloading ADK Deployment Tools layout (~700 MB)..."
          $proc = Start-Process -Wait -PassThru $adkSetup `
              -ArgumentList @('/quiet', '/layout', $env:ADK_LAYOUT_DIR, '/features', 'OptionId.DeploymentTools')
          if ($proc.ExitCode -eq 1001) {
              # Exit 1001 means a same or newer version of the ADK Deployment Tools is already
              # installed on this runner image.  We cannot create a layout for an older version,
              # but we can use the pre-installed components directly – skip ADK install step.
              Write-Host "ADK Deployment Tools already installed on runner (exit 1001) – skipping ADK layout."
              echo "adk_preinstalled=true" >> $env:GITHUB_OUTPUT
              $adkPreinstalled = $true
          } elseif ($proc.ExitCode -ne 0) {
              Write-Error "ADK layout download failed (exit $($proc.ExitCode))"
              exit 1
          } else {
              # Ensure the bootstrapper is in the layout dir for later offline install
              if (-not (Test-Path "$env:ADK_LAYOUT_DIR\adksetup.exe")) {
                  Copy-Item $adkSetup "$env:ADK_LAYOUT_DIR\adksetup.exe" -Force
              }
          }
          Write-Host "::endgroup::"

          # ---- Windows PE Add-on ----
          # Always attempt the WinPE layout even if ADK was pre-installed: the WinPE Add-on
          # is a separate installer and is often absent from runner images even when the ADK
          # Deployment Tools component is present.
          Write-Host "::group::Download Windows PE Add-on layout"
          $peSetup = "$env:TEMP\adkwinpesetup.exe"
          Write-Host "Fetching WinPE add-on setup (~5 MB)..."
          Invoke-WebRequest -Uri $env:ADK_PE_URL -OutFile $peSetup -UseBasicParsing
          Write-Host "Downloading Windows PE layout (~1.5 GB)..."
          $proc = Start-Process -Wait -PassThru $peSetup `
              -ArgumentList @('/quiet', '/layout', $env:ADK_PE_LAYOUT_DIR, '/features', 'OptionId.WindowsPreinstallationEnvironment')
          if ($proc.ExitCode -eq 1001) {
              Write-Host "WinPE Add-on already installed on runner (exit 1001) – skipping WinPE layout."
              echo "winpe_preinstalled=true" >> $env:GITHUB_OUTPUT
          } elseif ($proc.ExitCode -ne 0) {
              Write-Error "WinPE layout download failed (exit $($proc.ExitCode))"
              exit 1
          } else {
              if (-not (Test-Path "$env:ADK_PE_LAYOUT_DIR\adkwinpesetup.exe")) {
                  Copy-Item $peSetup "$env:ADK_PE_LAYOUT_DIR\adkwinpesetup.exe" -Force
              }
          }
          Write-Host "::endgroup::"
          if (-not $adkPreinstalled) { Write-Host "Both ADK layouts ready." }

      # ── 5. Install ADK Deployment Tools ───────────────────────────────────
      - name: Install Windows ADK – Deployment Tools
        if: steps.adk-check.outputs.installed != 'true' && steps.download-adk.outputs.adk_preinstalled != 'true'
        shell: pwsh
        run: |
          Write-Host "::group::Install ADK Deployment Tools"
          $setup = "$env:ADK_LAYOUT_DIR\adksetup.exe"
          if (-not (Test-Path $setup)) {
              Write-Error "adksetup.exe not found in $env:ADK_LAYOUT_DIR – cache may be incomplete."
              exit 1
          }
          Write-Host "Running: $setup"
          $logFile = "C:\adk-deploy.log"
          $proc = Start-Process -Wait -PassThru $setup `
              -ArgumentList "/features OptionId.DeploymentTools /quiet /norestart /log `"$logFile`""
          # 3010 = success, reboot pending (safe to ignore in CI)
          # 1001 = same or newer version already installed (treat as success)
          if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010 -and $proc.ExitCode -ne 1001) {
              Write-Error "ADK Deployment Tools install failed (exit $($proc.ExitCode)). Last 50 log lines:"
              Get-Content $logFile -ErrorAction SilentlyContinue | Select-Object -Last 50
              exit 1
          }
          if ($proc.ExitCode -eq 1001) {
              Write-Host "ADK Deployment Tools already installed (exit 1001) – continuing with pre-installed version."
          } else {
              Write-Host "ADK Deployment Tools installed successfully."
          }
          Write-Host "::endgroup::"

      # ── 6. Install WinPE Add-on ────────────────────────────────────────────
      - name: Install Windows PE Add-on
        if: steps.adk-check.outputs.installed != 'true' && steps.download-adk.outputs.winpe_preinstalled != 'true'
        shell: pwsh
        run: |
          Write-Host "::group::Install Windows PE Add-on"
          $setup = "$env:ADK_PE_LAYOUT_DIR\adkwinpesetup.exe"
          if (-not (Test-Path $setup)) {
              Write-Error "adkwinpesetup.exe not found in $env:ADK_PE_LAYOUT_DIR – cache may be incomplete."
              exit 1
          }
          Write-Host "Running: $setup"
          $logFile = "C:\adk-winpe.log"
          $proc = Start-Process -Wait -PassThru $setup `
              -ArgumentList "/features OptionId.WindowsPreinstallationEnvironment /quiet /norestart /log `"$logFile`""
          # 3010 = success, reboot pending (safe to ignore in CI)
          # 1001 = same or newer version already installed (treat as success)
          if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010 -and $proc.ExitCode -ne 1001) {
              Write-Error "WinPE Add-on install failed (exit $($proc.ExitCode)). Last 50 log lines:"
              Get-Content $logFile -ErrorAction SilentlyContinue | Select-Object -Last 50
              exit 1
          }
          if ($proc.ExitCode -eq 1001) {
              Write-Host "WinPE Add-on already installed (exit 1001) – continuing with pre-installed version."
          } else {
              Write-Host "Windows PE Add-on installed successfully."
          }
          Write-Host "::endgroup::"

      # ── 7. Build Nightmare OS WinPE ISO ───────────────────────────────────
      - name: Build Nightmare OS WinPE ISO
        shell: pwsh
        run: |
          $arch      = if ("${{ github.event.inputs.architecture }}"   -ne '') { "${{ github.event.inputs.architecture }}"   } else { 'amd64' }
          # [bool]::Parse() requires 'True'/'False'; normalise the input string to title-case.
          $incPython = if ("${{ github.event.inputs.include_python }}" -ne '') { [bool]::Parse(("${{ github.event.inputs.include_python }}").Substring(0,1).ToUpper() + ("${{ github.event.inputs.include_python }}").Substring(1).ToLower()) } else { $false }

          Write-Host "Architecture  : $arch"
          Write-Host "IncludePython : $incPython"
          Write-Host "WorkDir       : $env:WORK_DIR"

          .\winpe\Build-NightmareOS-PE.ps1 `
              -Architecture  $arch `
              -CreateISO     $true `
              -WorkDir       $env:WORK_DIR `
              -IncludePython $incPython

      # ── 8. Verify ISO ──────────────────────────────────────────────────────
      - name: Verify ISO and collect metadata
        id: iso-meta
        shell: pwsh
        run: |
          $isoPath = "$env:WORK_DIR\NightmareOS-PE.iso"
          if (-not (Test-Path $isoPath)) {
              Write-Error "ISO not found at $isoPath – build step may have failed."
              exit 1
          }
          $iso    = Get-Item $isoPath
          $sizeMB = [math]::Round($iso.Length / 1MB, 1)
          Write-Host "ISO: $($iso.FullName)  ($sizeMB MB)"
          echo "iso_path=$($iso.FullName)" >> $env:GITHUB_OUTPUT
          echo "iso_size_mb=$sizeMB"       >> $env:GITHUB_OUTPUT

      # ── 9. Upload ISO as workflow artifact ───────────────────────────────
      #
      # After the run, go to:
      #   Actions → this run → Artifacts (bottom of the page)
      # Click "NightmareOS-PE-ISO-<run_number>" to download a ZIP.
      # Extract the ZIP to get NightmareOS-PE.iso  (~300-500 MB).
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: NightmareOS-PE-ISO-${{ github.run_number }}
          path: ${{ steps.iso-meta.outputs.iso_path }}
          retention-days: 30
          if-no-files-found: error

      # ── 10. Attach ISO to GitHub Release (tag builds only) ─────────────────
      - name: Attach ISO to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.iso-meta.outputs.iso_path }}
          name: "Nightmare OS ${{ github.ref_name }}"
          body: |
            ## Nightmare OS WinPE – ${{ github.ref_name }}

            Bootable ISO (dual BIOS + UEFI) built automatically from this commit.

            **Size**: ${{ steps.iso-meta.outputs.iso_size_mb }} MB

            ### Usage
            | Method | Instructions |
            |---|---|
            | **VirtualBox / VMware / Hyper-V** | Attach ISO as optical drive → boot |
            | **USB (Rufus)** | Open [Rufus](https://rufus.ie), select ISO, write to USB |
            | **DVD** | Right-click ISO → *Burn disc image* |

      # ── 11. Job summary ────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: pwsh
        run: |
          $sizeMB   = "${{ steps.iso-meta.outputs.iso_size_mb }}"
          $arch     = if ("${{ github.event.inputs.architecture }}" -ne '') { "${{ github.event.inputs.architecture }}" } else { 'amd64' }
          $run      = "${{ github.run_number }}"
          # Use the outcome of the iso-meta step as the source of truth for success.
          $ok       = "${{ steps.iso-meta.outcome }}" -eq 'success'

          $icon   = if ($ok) { '✅' } else { '❌' }
          $status = if ($ok) { 'Build succeeded' } else { 'Build failed – see step logs for details' }

          $md = @"
          ## ${icon} Nightmare OS WinPE ISO – ${status}

          | Property | Value |
          |---|---|
          | Architecture | ``${arch}`` |
          | ISO size | ${sizeMB} MB |
          | Artifact | ``NightmareOS-PE-ISO-${run}`` |
          | Retention | 30 days |

          ### How to download the ISO

          1. Scroll to the **Artifacts** section at the bottom of this page.
          2. Click **``NightmareOS-PE-ISO-${run}``** – a ZIP file downloads.
          3. Extract the ZIP to get ``NightmareOS-PE.iso``.

          ### How to use the ISO

          | Method | Steps |
          |---|---|
          | **VirtualBox** | New VM → Settings → Storage → attach ISO as optical drive → Start |
          | **VMware** | New VM wizard → attach ISO → Power On |
          | **Hyper-V** | New VM → DVD settings → attach ISO → Start |
          | **USB (Rufus)** | [rufus.ie](https://rufus.ie) – select ISO, GPT/UEFI, click START |
          | **DVD** | Right-click ISO → *Burn disc image* |

          ### To build again

          Go to **Actions → Build Nightmare OS WinPE ISO → Run workflow**.
          "@
          $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
